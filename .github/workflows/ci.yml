name: 🧪 Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1 : Tests du backend ───────────────────────────────────────────────
  test-backend:
    name: 🔬 Tests Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: userapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-api/package-lock.json

      - name: 📚 Installation des dépendances
        working-directory: user-api
        run: npm ci

      - name: 🔍 Vérification TypeScript
        working-directory: user-api
        run: npx tsc --noEmit

      - name: 🗄️ Migration base de données
        working-directory: user-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userapi_test
        run: npx prisma migrate deploy

      - name: 🧪 Lancement des tests
        working-directory: user-api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userapi_test
          JWT_SECRET: test_jwt_secret_key_for_ci
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: test_refresh_secret_key_for_ci
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 3000
          CLIENT_URL: http://localhost:5173
          UPLOAD_DIR: uploads_test
          MAX_FILE_SIZE: "5242880"
        run: npm run test:coverage

      - name: 📊 Sauvegarde du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: user-api/coverage/
          retention-days: 7

  # ─── JOB 2 : Build du frontend ──────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-frontend/package-lock.json

      - name: 📚 Installation des dépendances
        working-directory: user-frontend
        run: npm ci

      # Vérifier que TypeScript compile séparément
      - name: 🔍 Vérification TypeScript
        working-directory: user-frontend
        run: npx tsc --noEmit --project tsconfig.json

      # Puis builder avec Vite seulement
      - name: 🏗️ Build de production
        working-directory: user-frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npx vite build