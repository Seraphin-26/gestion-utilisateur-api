name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1 : Tests backend ──────────────────────────────────────────────────
  test-backend:
    name: 🔬 Tests Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: userapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-api/package-lock.json

      - name: 📚 Installation
        working-directory: user-api
        run: npm ci

      - name: 🔍 TypeScript check
        working-directory: user-api
        run: npx tsc --noEmit

      - name: 🗄️ Migration BDD
        working-directory: user-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userapi_test
        run: npx prisma migrate deploy

      - name: 🧪 Tests
        working-directory: user-api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/userapi_test
          JWT_SECRET: test_secret_ci
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: test_refresh_ci
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 3000
          CLIENT_URL: http://localhost:5173
          UPLOAD_DIR: uploads_test
          MAX_FILE_SIZE: "5242880"
        run: npm run test:coverage

  # ─── JOB 2 : Build frontend ─────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-frontend/package-lock.json

      - name: 📚 Installation
        working-directory: user-frontend
        run: npm ci

      - name: 🏗️ Build
        working-directory: user-frontend
        env:
          VITE_API_URL: https://placeholder.railway.app
        run: npx vite build

  # ─── JOB 3 : Deploy (seulement si tests OK, seulement sur main) ─────────────
  deploy:
    name: 🚀 Déploiement
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]  # ← attend que les 2 jobs passent
    if: github.ref == 'refs/heads/main'    # ← seulement sur la branche main

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚂 Déploiement Railway (backend)
        run: |
          echo "✅ Railway se déploie automatiquement depuis GitHub"
          echo "Rien à faire ici — Railway surveille la branche main"

      - name: ▲ Déploiement Vercel (frontend)
        run: |
          echo "✅ Vercel se déploie automatiquement depuis GitHub"
          echo "Rien à faire ici — Vercel surveille la branche main"
